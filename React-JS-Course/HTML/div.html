<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Div Example</title>
</head>
<body>
    <main>
        <section style="background-color: beige; padding: 16px;">
            <h1>Content Group One</h1>
            <p>
                This section demonstrates how a div or section can group related content and styling.
            </p>
        </section>
        <section style="background-color: aqua; padding: 16px;">
            <h1>Content Group Two</h1>
            <p>
                This second group uses different background styling to show layout separation.
            </p>
        </section>
    </main>
</body>
</html>
