<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ID Example</title>
</head>
<body>
    <h1>ID Practice</h1>
    <p id="hero">
        The hero paragraph has a unique id so another element can link directly to it.
    </p>

    <p>
        IDs should be used for unique page targets, labels, and scripting hooks. Reusable styling belongs in classes.
    </p>

    <a href="#hero">Go to hero paragraph</a>
</body>
</html>
